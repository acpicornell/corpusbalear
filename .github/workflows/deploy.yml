name: Deploy

# Deploy the portal to Cloudflare Workers on push to main.
# Inert until a CLOUDFLARE_API_TOKEN repository secret is set: the guard step
# skips the deploy (keeping the run green) so this workflow can be committed
# before the token exists. Add the secret to activate it.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Cloudflare token
        id: guard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "No CLOUDFLARE_API_TOKEN secret set yet — skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
      - name: Deploy to Cloudflare Workers
        if: steps.guard.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
