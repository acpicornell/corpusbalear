name: Validate

# Dependency-free static validation of the portal: HTML sanity, JSON-LD
# validity, internal-anchor resolution, relative-asset existence, and
# card ↔ JSON-LD consistency. No secrets, no build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate portal
        run: python3 scripts/validate.py
